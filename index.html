<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Distinct Infrastructure - Asset Register</title>
  <style>
    :root{
      --primary-blue:#0b2f6b;
      --deep-blue:#071f47;
      --bright-blue:#1464d2;
      --soft-blue:#eaf3ff;
      --gold:#d4af37;
      --gold-light:#ffe7a3;
      --gold-deep:#9a7416;
      --white:#ffffff;
      --text:#12304f;
      --muted:#6b7a90;
      --line:rgba(20,68,126,0.16);
      --shadow:0 20px 60px rgba(7,31,71,0.18);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(212,175,55,0.32), transparent 30%),
        linear-gradient(135deg, var(--deep-blue) 0%, var(--primary-blue) 45%, var(--bright-blue) 100%);
      padding:24px;
      color:var(--text);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-30%;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
      animation:shine 8s linear infinite;
      pointer-events:none;
    }

    @keyframes shine{
      0%{transform:translateX(-40%) rotate(10deg)}
      100%{transform:translateX(40%) rotate(10deg)}
    }

    .container{
      position:relative;
      max-width:1400px;
      margin:auto;
      background:rgba(255,255,255,0.96);
      padding:28px;
      border-radius:26px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.5);
      animation:pageIn 0.75s ease both;
    }

    @keyframes pageIn{
      from{opacity:0; transform:translateY(18px)}
      to{opacity:1; transform:translateY(0)}
    }

    .header{
      text-align:center;
      margin-bottom:28px;
      padding:28px 20px;
      border-radius:22px;
      background:linear-gradient(135deg, var(--primary-blue), var(--bright-blue));
      color:white;
      box-shadow:0 14px 35px rgba(11,47,107,0.28);
      position:relative;
      overflow:hidden;
    }

    .header::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(212,175,55,0.25);
      right:-50px;
      top:-70px;
      animation:floatOrb 5s ease-in-out infinite alternate;
    }

    @keyframes floatOrb{
      from{transform:translateY(0) scale(1)}
      to{transform:translateY(22px) scale(1.08)}
    }

    .header h1{
      color:white;
      margin-bottom:8px;
      font-size:clamp(26px, 4vw, 42px);
      letter-spacing:0.5px;
    }

    .header p{
      color:#eef6ff;
      font-size:14px;
      line-height:1.5;
      position:relative;
      z-index:1;
    }

    .header strong{ color:var(--gold-light); }

    .form-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap:16px;
      margin-bottom:22px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      padding:14px;
      background:linear-gradient(180deg, #ffffff, var(--soft-blue));
      border:1px solid var(--line);
      border-radius:18px;
      transition:transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      animation:cardIn 0.45s ease both;
    }

    .form-group:hover{
      transform:translateY(-3px);
      box-shadow:0 14px 28px rgba(11,47,107,0.12);
      border-color:rgba(212,175,55,0.7);
    }

    @keyframes cardIn{
      from{opacity:0; transform:translateY(10px)}
      to{opacity:1; transform:translateY(0)}
    }

    label{
      margin-bottom:7px;
      font-weight:bold;
      color:var(--primary-blue);
      font-size:13px;
    }

    input, select, textarea{
      width:100%;
      padding:12px 13px;
      border:1px solid rgba(11,47,107,0.22);
      border-radius:12px;
      font-size:14px;
      background:white;
      color:var(--text);
      transition:border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus, select:focus, textarea:focus{
      outline:none;
      border-color:var(--gold);
      box-shadow:0 0 0 4px rgba(212,175,55,0.2);
      transform:translateY(-1px);
    }

    textarea{ min-height:44px; resize:vertical; }

    button{
      background:linear-gradient(135deg, var(--gold), var(--gold-deep));
      color:#071f47;
      border:none;
      padding:14px 30px;
      border-radius:999px;
      cursor:pointer;
      font-size:15px;
      font-weight:800;
      margin-top:10px;
      box-shadow:0 12px 26px rgba(154,116,22,0.28);
      transition:transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 34px rgba(154,116,22,0.36);
      filter:saturate(1.1);
    }

    .status{
      margin-top:16px;
      font-weight:bold;
      color:var(--primary-blue);
      background:rgba(212,175,55,0.16);
      border-left:5px solid var(--gold);
      padding:12px 14px;
      border-radius:12px;
      min-height:20px;
    }

    .table-wrap{
      width:100%;
      overflow-x:auto;
      border-radius:18px;
      border:1px solid var(--line);
      margin-top:28px;
      box-shadow:0 10px 24px rgba(11,47,107,0.08);
    }

    table{
      width:100%;
      min-width:980px;
      border-collapse:collapse;
      background:white;
    }

    th{
      background:linear-gradient(135deg, var(--primary-blue), var(--bright-blue));
      color:white;
      padding:13px;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
      border-bottom:3px solid var(--gold);
    }

    td{
      padding:11px 13px;
      border-bottom:1px solid var(--line);
      font-size:13px;
      color:var(--text);
      white-space:nowrap;
    }

    tr{ transition:background 0.2s ease; }
    tr:hover{ background:#f4f8ff; }

    @media (max-width: 768px){
      body{ padding:12px; }
      .container{ padding:16px; border-radius:20px; }
      .header{ padding:24px 14px; }
      .form-grid{ grid-template-columns:1fr; gap:12px; }
      .form-group{ padding:12px; }
      button{ width:100%; }
      .table-wrap{ margin-top:20px; }
      table{ min-width:900px; }
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation-duration:0.01ms !important;
        animation-iteration-count:1 !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBd5q_0l5krjYe5fCxhY3xl8J664W3OgHzPuSafzDblLMLAnNgiKSYnP9xRZeAP9JqNg/exec";

const FIELD_IDS = [
  "code", "assetClass", "purchaseDate", "purchasedBy", "financing", "description",
  "model", "bodyType", "registrationNo", "engineNo", "vinNo", "cost", "marketValue",
  "zoho", "location", "driverOperator", "licenced", "typeOfLicence", "validityOfLicence",
  "allocationDept", "registeredEntity", "coveredBy", "trackingCompany", "installmentAmount",
  "lastInstallmentDate", "eTagToll", "notes", "regBoo", "usefulLife", "recharge",
  "monthlyDpn", "year", "monthsDpn", "accumDpn", "nbv", "oustandingVaf", "value"
];

document.getElementById("assetForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {};
  FIELD_IDS.forEach(function(id){
    data[id] = document.getElementById(id).value;
  });

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(response => {
    if (response.status !== "success") throw new Error(response.message || "Save failed");
    document.getElementById("status").innerHTML = "Asset Saved Successfully";
    addToTable(data);
    document.getElementById("assetForm").reset();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").innerHTML = "Error Saving Asset";
  });
});

function addToTable(data){
  const tbody = document.querySelector("#assetTable tbody");
  const row = `
    <tr>
      <td>${data.code || ""}</td>
      <td>${data.assetClass || ""}</td>
      <td>${data.registrationNo || ""}</td>
      <td>${data.engineNo || ""}</td>
      <td>${data.vinNo || ""}</td>
      <td>${data.model || ""}</td>
      <td>${data.bodyType || ""}</td>
      <td>${data.driverOperator || ""}</td>
      <td>${data.allocationDept || ""}</td>
      <td>${data.cost || ""}</td>
      <td>${data.marketValue || ""}</td>
    </tr>
  `;
  tbody.innerHTML += row;
}
</script>
